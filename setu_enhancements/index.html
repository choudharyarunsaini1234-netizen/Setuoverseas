<!doctype html>
<html lang="en">

    <meta charset="UTF-8" />

    <!-- ═══════════════════════════════════════════════

    ═══════════════════════════════════════════════ -->

        "@type": "ImageObject",
        "url": "https://www.setuoverseas.com/logo.png"

      "description": "B2B exporter of automotive components, rubber parts, and industrial goods from India to 40+ countries. Quality-inspected, fully documented, on-time delivery.",
      "foundingDate": "2014",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "JMD Empire, Sector 62",
        "addressLocality": "Gurgaon",
        "addressRegion": "Haryana",
        "postalCode": "122001",
        "addressCountry": "IN"
      },
      "contactPoint": [
        {
          "@type": "ContactPoint",
          "telephone": "+91-7836908406",
          "contactType": "sales",
          "email": "setuoverseas586@gmail.com",
          "availableLanguage": ["English"],
          "contactOption": "TollFree",
          "areaServed": "Worldwide"
        }
      ],
      "areaServed": {
        "@type": "AdministrativeArea",
        "name": "Worldwide"
      },
      "numberOfEmployees": {
        "@type": "QuantitativeValue",
        "minValue": 10
      },
      "founder": {
        "@type": "Person",
        "name": "Arun Saini",
        "jobTitle": "Founder & Director"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Export Product Catalog",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Product",
              "name": "Precision Rubber Components",

            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Product",
              "name": "Automotive Gears & Transmission",
              "description": "CNC-precision spur gears, helical gears, and shafts"
            }
          }
        ]
      }

    <!-- ═══════════════════════════════════════════════

    <!-- ═══════════════════════════════════════════════

         Replace "setuoverseas.com" with your actual domain
    ═══════════════════════════════════════════════ -->
    <script defer data-domain="setuoverseas.com" src="https://plausible.io/js/script.js"></script>

    <!-- Skip link for keyboard / screen reader users (WCAG 2.1 SC 2.4.1) -->

      href="#main-content"
      id="skip-link"
      style="
        position: absolute;
        top: -100px;
        left: 1rem;
        background: #D4A03A;
        color: #0B0F17;
        padding: 0.6rem 1.2rem;
        border-radius: 8px;
        font-weight: 700;
        font-family: sans-serif;
        font-size: 0.9rem;
        z-index: 9999;
        transition: top 0.2s ease;
        text-decoration: none;
      "
      onfocus="this.style.top='1rem'"
      onblur="this.style.top='-100px'"
    >
      Skip to main content
    </a>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
